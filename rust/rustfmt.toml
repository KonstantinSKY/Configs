# Project edition; keep in sync with Cargo.toml.
edition = "2024"

# Layout
max_width = 120
newline_style = "Unix"

# Stable formatting
match_block_trailing_comma = true

# Nightly-only formatting features. Apply via `make fmt` (cargo +nightly fmt).
# Stable rustfmt ignores these with a warning.
unstable_features = true
group_imports = "StdExternalCrate"
imports_granularity = "Crate"
wrap_comments = true
comment_width = 120
format_code_in_doc_comments = true
