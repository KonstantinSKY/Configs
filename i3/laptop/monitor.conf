# Laptop-specific settings
#
exec_always --no-startup-id ~/.config/i3/scripts/monitor-layout
exec_always --no-startup-id ~/.config/i3/scripts/monitor-hotplug-watch

exec_always --no-startup-id picom -b

# Blueman applet for Bluetooth management
exec_always --no-startup-id blueman-applet
exec_always --no-startup-id sh -c 'sleep 2; rfkill unblock bluetooth; bluetoothctl power on'

# Wallpaper is re-rendered by monitor-layout after xrandr changes the screen size.
