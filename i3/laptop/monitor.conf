# Laptop-specific settings
#
exec --no-startup-id xrandr --output eDP --primary --dpi 96 --auto

# Keep the laptop awake until the suspend/wake issue is fixed.
exec --no-startup-id systemd-inhibit --what=idle:sleep:handle-lid-switch --who=i3 --why="Disable suspend on laptop" sleep infinity
exec --no-startup-id xset s off
exec --no-startup-id xset -dpms
exec --no-startup-id xset s noblank

# Blueman applet for Bluetooth management
exec_always --no-startup-id blueman-applet
exec_always --no-startup-id sh -c 'sleep 2; rfkill unblock bluetooth; bluetoothctl power on'

# Восстановление обоев на всех экранах (с небольшой задержкой)
exec_always --no-startup-id sleep 2; nitrogen --restore

bar {
    i3bar_command i3bar
    status_command i3status -c ~/.i3/host/i3status.conf
    position bottom

    # Keep tray applets on the active primary output so they do not disappear
    # when the laptop is docked or an external display becomes primary.
    tray_output primary
    bindsym button4 nop
    bindsym button5 nop
    font xft:URWGothic-Book 9
    strip_workspace_numbers yes

    colors {
        background #222D31
        statusline #999999
        separator  #454947

        # border  backgr. text
        focused_workspace  #F9FAF9 #16a085 #292F34
        active_workspace   #595B5B #353836 #FDF6E3
        inactive_workspace #595B5B #222D31 #EEE8D5
        binding_mode       #16a085 #2C2C2C #F9FAF9
        urgent_workspace   #16a085 #FDF6E3 #E5201D
    }
}
