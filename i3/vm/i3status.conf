# i3status configuration for virtual machines.

general {
    colors = true
    interval = 5
    output_format = "i3bar"
    color_good = "#66AA66"
    color_degraded = "#CCAA44"
    color_bad = "#AA5555"
}

order += "ethernet _first_"
order += "cpu_usage"
order += "load"
order += "disk /"
order += "memory"
order += "tztime local"

ethernet _first_ {
    format_up = "🔌 %ip (%speed)"
    format_down = "🔌 down"
}

cpu_usage {
    format = "CPU: %usage"
}

load {
    format = "%1min"
}

disk "/" {
    format = "💽 %avail"
}

memory {
    format = "RAM: %used / %available"
    threshold_degraded = "1G"
    format_degraded = "MEMORY < %available"
}

tztime local {
    format = "🕓 %m-%d-%Y %H:%M"
}
