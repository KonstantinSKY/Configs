# i3blocks bar — shared layout for all profiles (desktop / laptop / vm).
# Each profile dir contains a symlink:  <profile>/i3blocks.conf -> ../shared/i3blocks.conf
# The [battery] block prints nothing on machines without /sys/class/power_supply/BAT*,
# so it is invisible on desktop / VM and visible on laptop.

# Global properties
separator=false
markup=pango

# === Launchers ===

[terminal]
full_text=  
color=#807dfe
command=i3-msg -q exec xfce4-terminal

[browser]
full_text=  
color=#ff7f81
command=i3-msg -q exec firefox

[files]
full_text=  
color=#7f3fbf
command=i3-msg -q exec thunar ~/

[editor]
full_text=  
color=#f5c542
command=i3-msg -q exec sh -c 'command -v zeditor >/dev/null 2>&1 && exec zeditor || exec xed'

[telegram]
full_text=  
color=#2ca5e0
command=i3-msg -q exec sh -c 'command -v telegram-desktop >/dev/null 2>&1 && exec telegram-desktop || command -v Telegram >/dev/null 2>&1 && exec Telegram || exec telegram'

[sep]
full_text= │
color=#5e646f

# === System ===

[disk]
label=  
instance=/
command=~/.config/i3/scripts/disk
interval=30

[memory]
label=  
command=~/.config/i3/scripts/memory
interval=2

[cpu_usage]
label=  
command=~/.config/i3/scripts/cpu_usage
interval=2

[CPU-temperature]
command=~/.config/i3/scripts/temperature
interval=30

[sep]
full_text= │
color=#5e646f

# === Network ===

[bandwidth]
command=~/.config/i3/scripts/bandwidth2 -u KB
interval=persist

# === Battery (laptop only — script self-detects /sys/class/power_supply/BAT*) ===

[battery]
command=~/.config/i3/scripts/battery
interval=30

[sep]
full_text= │
color=#5e646f

# === Audio ===
# Single block: left click opens pavucontrol, scroll +/-, right click mutes.

[volume]
command=~/.config/i3/scripts/volume
interval=2

[sep]
full_text= │
color=#5e646f

# === Power profile ===
# Single block: left click opens the rofi profile switcher.

[ppd-status]
command=~/.config/i3/scripts/ppd-status
interval=5

[sep]
full_text= │
color=#5e646f

# === Time ===

[time]
command=date '+%a %d %b %H:%M:%S'
interval=1

[sep]
full_text= │
color=#5e646f

# === Actions ===

[keybindings]
full_text=  
command=~/.config/i3/scripts/keyhint-2

[shutdown_menu]
full_text=  
command=~/.config/i3/scripts/powermenu

[sep]
full_text= │
color=#5e646f
