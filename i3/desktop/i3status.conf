# i3status configuration file.
# see "man i3status" for documentation.

# It is important that this file is edited as UTF-8.
# The following line should contain a sharp s:
# ß
# If the above line is not correctly displayed, fix your editor first!

general {
    colors = true
    interval = 5
    output_format = "i3bar"
    color_good = "#66AA66"
    color_degraded = "#CCAA44"
    color_bad = "#AA5555"
}

order += "cpu_temperature 0"
order += "cpu_temperature 1"
order += "cpu_temperature 2"
order += "cpu_temperature 3"
order += "wireless _first_"
order += "ethernet _first_"
order += "cpu_usage"
order += "load"
order += "disk /"
order += "memory"
order += "tztime local"

cpu_temperature 0 {
    format = "🌡️ CPU: %degrees°"
    path = "/sys/class/hwmon/hwmon10/temp1_input"
    max_threshold = 85
}

cpu_temperature 1 {
    format = "GPU: %degrees°"
    path = "/sys/class/hwmon/hwmon3/temp1_input"
    max_threshold = 90
}

cpu_temperature 2 {
    format = "NVMs: %degrees°"
    path = "/sys/class/hwmon/hwmon1/temp1_input"
    max_threshold = 70
}

cpu_temperature 3 {
    format = " %degrees°"
    path = "/sys/class/hwmon/hwmon2/temp1_input"
    max_threshold = 70
}

wireless _first_ {
    format_up = "📡 %essid %ip"
    format_down = "📡 down"
}

ethernet _first_ {
    format_up = "🔌 %ip (%speed)"
    format_down = "🔌 down"
}

cpu_usage {
    format = "CPU: %usage"
}

load {
    format = "%1min"
}

disk "/" {
    format = "💽 %avail"
}

memory {
    format = "RAM: %used / %available"
    threshold_degraded = "1G"
    format_degraded = "MEMORY < %available"
}

tztime local {
    format = "🕓 %m-%d-%Y %H:%M"
}
