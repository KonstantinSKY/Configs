[env]
TERM = "xterm-256color"

[terminal.shell]
program = "/bin/zsh"
args = ["-l"]

[general]
live_config_reload = true

[font]
size = 8.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Light"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Light Italic"

# Default colors
[colors.primary]
background = '#1D1F26'
foreground = '#d3dae3'

# Cursor colors
[colors.cursor]
cursor = '#6fa8d6'
text = '#d8dee9'

# Normal colors
[colors.normal]
black = '#000000'
blue = '#6699cc'
cyan = '#5fb4b4'
green = '#99c794'
magenta = '#c695c6'
red = '#ac523f'
white = '#f7f7f7'
yellow = '#f9ae58'

# Bright colors
[colors.bright]
black = '#333333'
blue = '#85add6'
cyan = '#82c4c4'
green = '#acd1a8'
magenta = '#d8b6d8'
red = '#f97b58'
white = '#ffffff'
yellow = '#fac761'

# Selection colors
[colors.selection]
background = '#4e5a65'
text = '#d8dee9'

[window]
title = "Terminal"
padding = { x = 5, y = 5 }
dynamic_padding = true
opacity = 0.92
dynamic_title = false

[scrolling]
history = 50000
multiplier = 4

[cursor]
style = { shape = "Block", blinking = "On"}
vi_mode_style = { shape = "Beam", blinking = "On"}
blink_interval = 750

[keyboard]
# Toggle vi mode
bindings = [
	{ key = "Space", mods = "Control", mode = "~Vi", action = "ToggleViMode" },
	{ key = "Escape", mode = "Vi", action = "ToggleViMode" },
	# Copy and paste
	{ key = "V", mods = "Control|Shift", action = "Paste" },
	{ key = "C", mods = "Control|Shift", action = "Copy" },
	{ key = "Return", mods = "Shift", chars = "\u001B\r" },
	{ key = "N", mods = "Control|Shift", action = "CreateNewWindow" }
]

[mouse]
hide_when_typing = true
bindings = [
	{ mouse = "Right", mods = "Control", action = "Paste" },
	{ mouse = "Left", mods = "Control", action = "Copy" }
]

[selection]
save_to_clipboard = true

[terminal]
osc52 = "CopyPaste"
